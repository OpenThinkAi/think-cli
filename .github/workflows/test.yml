name: test

on:
  push:
    branches: [main]
  pull_request:

# AGT-064 AC #7: scope GITHUB_TOKEN to the minimum the workflow needs.
# Test does no writes; `contents: read` is sufficient. A future step that
# needs more (e.g. posting a comment) should override at the job level
# rather than expand the default here.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # AGT-064 AC #6: actions pinned to 40-char commit SHA, not mutable
      # tags. A moved @v4 / @v2 tag could let an upstream compromise ship
      # arbitrary CI code into our test pipeline. Renovate (or pinact)
      # keeps these moving across releases.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          # Bun runs install/test/build; node:24 is still the runtime target
          # for the bundled binary (vitest is invoked through `bun run test`
          # which spawns node under the hood).
          node-version: '24'
      - run: git config --global user.email "ci@example.com"
      - run: git config --global user.name "CI"
      # Frozen-lockfile install (AGT-060). Switching from npm to bun closes
      # the supply-chain drift gap that npm/cli#4828 forced open: bun's
      # lockfile (`bun.lock`) handles cross-platform optional native bindings
      # without baking platform-specific entries that diverge between dev
      # (macOS-arm64) and CI (linux-x64), so `--frozen-lockfile` works on
      # every PR without lockfile churn. A drift in committed bun.lock vs.
      # package.json now fails the workflow rather than silently re-resolving.
      - run: bun install --frozen-lockfile
      - run: bun run --cwd packages/cli test
      # Tests run against the TS source via tsx, so they don't catch bundling
      # bugs in dist/. Boot the bundled artifact via `think serve` and hit
      # /v1/health to make sure the published binary actually starts (e.g.
      # node:sqlite prefix survived, no missing externals, env-var validation
      # paths work). Post-AGT-030 the proxy ships inside the CLI package.
      - name: Smoke-test bundled `think serve`
        run: |
          bun run --cwd packages/cli build
          THINK_TOKEN=smoke-token PORT=18327 \
            THINK_DB_PATH="$(mktemp -t open-think-smoke.XXXXXX.sqlite)" \
            node packages/cli/dist/index.js serve &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT
          for i in $(seq 1 20); do
            if curl -fs http://localhost:18327/v1/health >/dev/null 2>&1; then
              break
            fi
            sleep 0.5
          done
          curl -fsS http://localhost:18327/v1/health
          echo
