name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.5'
          cache: npm
      - run: git config --global user.email "ci@example.com"
      - run: git config --global user.name "CI"
      - run: npm ci
      # Fill in platform-matching optional native bindings that `npm ci`
      # skips when the lockfile's resolve tree was generated on a different
      # platform (npm/cli#4828). The lockfile already pins every platform
      # variant we need; --no-save guarantees package.json stays untouched
      # and `npm ci` above would have failed loudly on any real drift, so
      # this step cannot mask manifest/lockfile mismatch.
      - run: npm install --no-save --no-audit --no-fund
      - run: npm test
