name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: git config --global user.email "ci@example.com"
      - run: git config --global user.name "CI"
      # Workaround for npm/cli#4828: cross-platform lockfiles cause `npm ci`
      # (and `npm install` against the existing lockfile) to skip
      # platform-matching optional native bindings, which makes vitest 4
      # crash at startup because rolldown can't load its native binding.
      # The npm bug report itself recommends deleting both node_modules and
      # package-lock.json and running a fresh `npm install` — that re-resolves
      # from package.json and correctly picks the current-platform optionals.
      #
      # Trade-off accepted: we lose `npm ci`'s lockfile-drift detection,
      # because the committed lockfile (generated on macOS-arm64) is
      # structurally different from one regenerated on linux-x64 — npm
      # bakes platform-specific rollup/rolldown native binding entries
      # into the lockfile based on the generating platform, so a naive
      # `git diff --exit-code` against the regen always fails with ~300
      # lines of platform churn. Until we switch off npm to a package
      # manager that handles cross-platform optional natives correctly
      # (pnpm/bun/yarn — to be filed as a follow-up ticket), supply-chain
      # drift detection has to live outside this workflow.
      - run: rm -rf node_modules package-lock.json
      - run: npm install --no-audit --no-fund
      - run: npm test
      # Tests run against the TS source via tsx, so they don't catch bundling
      # bugs in dist/. Boot the bundled artifact and hit /v1/health to make
      # sure the published binary actually starts (e.g. node:sqlite prefix
      # survived, no missing externals, env-var validation paths work).
      - name: Smoke-test bundled server
        run: |
          npm run build -w open-think-server
          THINK_TOKEN=smoke-token PORT=18327 \
            THINK_DB_PATH="$(mktemp -t open-think-smoke.XXXXXX.sqlite)" \
            node packages/server/dist/index.js &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT
          for i in $(seq 1 20); do
            if curl -fs http://localhost:18327/v1/health >/dev/null 2>&1; then
              break
            fi
            sleep 0.5
          done
          curl -fsS http://localhost:18327/v1/health
          echo
