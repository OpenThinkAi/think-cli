name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.5'
          cache: npm
      - run: git config --global user.email "ci@example.com"
      - run: git config --global user.name "CI"
      - run: npm install
      - run: npm test
